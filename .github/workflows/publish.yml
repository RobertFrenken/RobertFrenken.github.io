name: MyST Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MyST
        run: npm install -g mystmd

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile CV
        run: typst compile cv.typ Frenken_Robert_CV.pdf

      - name: Build site
        run: myst build --html

      - name: Copy CV to build output
        run: cp Frenken_Robert_CV.pdf _build/html/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
